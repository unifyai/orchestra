name: Billing Health Check

on:
  schedule:
    # Daily at 6:00 AM UTC
  - cron: '0 6 * * *'
  workflow_dispatch:
    inputs:
      lookback_hours:
        description: 'Time window for recharge activity metrics'
        required: false
        default: '24'

jobs:
  health_production:
    name: Health Check Production
    runs-on: ubuntu-latest

    steps:
    - name: Run billing health check
      run: |
        LOOKBACK="${{ github.event.inputs.lookback_hours || '24' }}"

        response=$(curl -s -w "\n%{http_code}" -X POST \
          "https://api.unify.ai/v0/admin/billing/health?lookback_hours=${LOOKBACK}" \
          -H "Authorization: Bearer ${{ secrets.ORCHESTRA_ADMIN_KEY }}")

        http_code=$(echo "$response" | tail -1)
        body=$(echo "$response" | head -n -1)

        echo "Response: $body"
        echo "HTTP Status: $http_code"

        if [ "$http_code" != "200" ]; then
          echo "::error::Billing health check failed with status $http_code"
          exit 1
        fi

        # Parse results
        total=$(echo "$body" | jq -r '.account_snapshot.total // 0')
        active=$(echo "$body" | jq -r '.account_snapshot.active // 0')
        past_due=$(echo "$body" | jq -r '.account_snapshot.past_due // 0')
        suspended=$(echo "$body" | jq -r '.account_snapshot.suspended // 0')
        at_risk=$(echo "$body" | jq -r '.account_snapshot.at_risk // 0')
        alerts=$(echo "$body" | jq -r '.total_alerts // 0')
        critical=$(echo "$body" | jq -r '.critical // 0')

        echo "::notice::Accounts: $total total ($active active, $past_due past_due, $suspended suspended)"
        echo "::notice::At risk: $at_risk active accounts with <= 0 credits"
        echo "::notice::Alerts: $alerts total ($critical critical)"

        if [ "$critical" -gt 0 ]; then
          echo "::error::$critical CRITICAL billing health alerts"
          echo "$body" | jq '.alerts[] | select(.severity == "critical")'
          exit 1
        fi

  health_staging:
    name: Health Check Staging
    runs-on: ubuntu-latest

    steps:
    - name: Run billing health check
      run: |
        LOOKBACK="${{ github.event.inputs.lookback_hours || '24' }}"

        response=$(curl -s -w "\n%{http_code}" -X POST \
          "https://api.staging.internal.saas.unify.ai/v0/admin/billing/health?lookback_hours=${LOOKBACK}" \
          -H "Authorization: Bearer ${{ secrets.ORCHESTRA_ADMIN_KEY }}")

        http_code=$(echo "$response" | tail -1)
        body=$(echo "$response" | head -n -1)

        echo "Response: $body"
        echo "HTTP Status: $http_code"

        if [ "$http_code" != "200" ]; then
          echo "::error::Billing health check (staging) failed with status $http_code"
          exit 1
        fi

        total=$(echo "$body" | jq -r '.account_snapshot.total // 0')
        active=$(echo "$body" | jq -r '.account_snapshot.active // 0')
        alerts=$(echo "$body" | jq -r '.total_alerts // 0')

        echo "::notice::Accounts: $total total ($active active)"
        echo "::notice::Alerts: $alerts"
