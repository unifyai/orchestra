name: Outage Alerts

on:
  # schedule:
    # runs every hour
  # - cron: '0 * * * *'
  workflow_dispatch:

jobs:
  outage_alerts:
    name: Outage Alerts
    runs-on: ubuntu-latest

    steps:
    - name: Checkout
      uses: actions/checkout@v3
      with:
        submodules: 'true'

    - name: Auth into Google Cloud
      uses: 'google-github-actions/auth@v2'
      # This service account also needs pub/sub
      with:
        credentials_json: '${{ secrets.GCP_DEFAULT_CREDENTIALS }}'

    - name: Set up Python
      uses: actions/setup-python@v2
      with:
        python-version: "3.9"

    - name: Install deps
      uses: knowsuchagency/poetry-install@v1
      env:
        POETRY_VIRTUALENVS_CREATE: false

    - name: Alert Prod
      run: |
        python3 outage_alerts.py false ${{ secrets.DISCORD_WEBHOOK_URL }}

    - name: Alert Staging
      run: |
        python3 outage_alerts.py true ${{ secrets.DISCORD_WEBHOOK_URL }}
