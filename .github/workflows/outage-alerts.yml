name: Dockerfile Push

on:
  # schedule:
    # runs everyday at 23:00 UTC
    # - cron:  '0 * * * *'
  workflow_dispatch:

jobs:
  sync:
    name: Sync
    runs-on: ubuntu-latest
    steps:
    - name: Checkout
      uses: actions/checkout@v3

    - name: Auth into Google Cloud
      uses: 'google-github-actions/auth@v2'
      # This service account also needs pub/sub
      with:
        credentials_json: '${{ secrets.ORCHESTRA_VERTEXAI_CREDENTIALS }}'

    - name: Set up Python
      uses: actions/setup-python@v2
      with:
        python-version: "3.10"

    - name: Install deps
      uses: knowsuchagency/poetry-install@v1
      env:
        POETRY_VIRTUALENVS_CREATE: false

    - name: Alert Prod
      run: |
        cd orchestra
        python3 outage_alerts.py false ${{ secrets.DISCORD_WEBHOOK_URL }}
        cd ..

    - name: Alert Staging
      run: |
        cd orchestra
        python3 outage_alerts.py true ${{ secrets.DISCORD_WEBHOOK_URL }}
        cd ..
