  #     - name: Set up Python
  #       uses: actions/setup-python@v2
  #       with:
  #         python-version: "3.9"
  #     - name: Install deps
  #       uses: knowsuchagency/poetry-install@v1
  #       env:
  #         POETRY_VIRTUALENVS_CREATE: false
  #     - name: Run flake8 check
  #       run: poetry run flake8 --count .
  # mypy:
  #   runs-on: ubuntu-latest
  #   steps:
  #     - uses: actions/checkout@v2
  #     - name: Set up Python
  #       uses: actions/setup-python@v2
  #       with:
  #         python-version: "3.9"
  #     - name: Install deps
  #       uses: knowsuchagency/poetry-install@v1
  #       env:
  #         POETRY_VIRTUALENVS_CREATE: false
  #     - name: Run mypy check
  #       run: poetry run mypy --install-types --non-interactive .
  pytest:
    runs-on: ubuntu-latest
    environment: orchestra-testing
    services:
      orchestra-db:
        image: pgvector/pgvector:pg15
        env:
          POSTGRES_PASSWORD: orchestra
          POSTGRES_USER: orchestra
          POSTGRES_DB: orchestra
        options: >-
          --health-cmd="pg_isready"
          --health-interval=10s
          --health-timeout=5s
          --health-retries=5
        ports:
        - 5432:5432
    steps:

    - uses: actions/checkout@v2
    - name: Auth into Google Cloud
      uses: 'google-github-actions/auth@v2'
      # This service account also needs pub/sub
      with:
        credentials_json: '${{ secrets.ORCHESTRA_VERTEXAI_CREDENTIALS }}'

    - name: Set up Python
      uses: actions/setup-python@v2
      with:
        python-version: "3.10"

    - name: Install deps
      uses: knowsuchagency/poetry-install@v1
      env:
        POETRY_VIRTUALENVS_CREATE: false

    - name: Run pytest check
      run: poetry run pytest -p no:warnings -vv --cov="orchestra" -n 4 . -m "not performance"
      env:
        ORCHESTRA_HOST: "0.0.0.0"
        ORCHESTRA_DB_HOST: localhost
        ORCHESTRA_VERTEXAI_PROJECT: saas-368716
        ORCHESTRA_OPENAI_API_KEY: ${{ secrets.ORCHESTRA_OPENAI_API_KEY }}
        ORCHESTRA_ANYSCALE_API_KEY: ${{ secrets.ORCHESTRA_ANYSCALE_API_KEY }}
        ORCHESTRA_REPLICATE_API_KEY: ${{ secrets.ORCHESTRA_REPLICATE_API_KEY }}
        ORCHESTRA_DEEPINFRA_API_KEY: ${{ secrets.ORCHESTRA_DEEPINFRA_API_KEY }}
        ORCHESTRA_FIREWORKS_AI_API_KEY: ${{ secrets.ORCHESTRA_FIREWORKS_AI_API_KEY }}
        ORCHESTRA_GROQ_API_KEY: ${{ secrets.ORCHESTRA_GROQ_API_KEY }}
        ORCHESTRA_LEPTON_AI_API_KEY: ${{ secrets.ORCHESTRA_LEPTON_AI_API_KEY }}
        ORCHESTRA_ANTHROPIC_API_KEY: ${{ secrets.ORCHESTRA_ANTHROPIC_API_KEY }}
        ORCHESTRA_MISTRAL_AI_API_KEY: ${{ secrets.ORCHESTRA_MISTRAL_AI_API_KEY }}
        ORCHESTRA_TOGETHER_AI_API_KEY: ${{ secrets.ORCHESTRA_TOGETHER_AI_API_KEY }}
        ORCHESTRA_DEEPSEEK_API_KEY: ${{ secrets.ORCHESTRA_DEEPSEEK_API_KEY }}
        ORCHESTRA_ORGANIZATION_NAME: ${{ secrets.ORCHESTRA_ORGANIZATION_NAME }}
        ORCHESTRA_OWNER_ID: ${{ secrets.ORCHESTRA_OWNER_ID }}
        ORCHESTRA_PROD_TRAFFIC_NAME: ${{ secrets.ORCHESTRA_PROD_TRAFFIC_NAME }}
        ORCHESTRA_XAI_API_KEY: ${{ secrets.ORCHESTRA_XAI_API_KEY }}
        ORCHESTRA_VERTEXAI_SERVICE_ACC_JSON: ${{ env.GOOGLE_APPLICATION_CREDENTIALS }}
        ORCHESTRA_GCP_BUCKET_NAME: ${{ secrets.ORCHESTRA_GCP_BUCKET_NAME }}
        ORCHESTRA_GCP_ASSISTANT_IMAGES_BUCKET_NAME: ${{ secrets.ORCHESTRA_GCP_ASSISTANT_IMAGES_BUCKET_NAME }}
        ORCHESTRA_GCP_ASSISTANT_RECORDINGS_BUCKET_NAME: ${{ secrets.ORCHESTRA_GCP_ASSISTANT_RECORDINGS_BUCKET_NAME}}
        ORCHESTRA_ADMIN_KEY: ${{ secrets.ORCHESTRA_ADMIN_KEY }}
        AUTH_ACCOUNT_API_KEY: ${{ secrets.AUTH_ACCOUNT_API_KEY }}
        AUTH_ACCOUNT_USER_ID: ${{ secrets.AUTH_ACCOUNT_USER_ID }}
        AWS_ACCESS_KEY_ID: ${{ secrets.AWS_ACCESS_KEY_ID }}
        AWS_SECRET_ACCESS_KEY: ${{ secrets.AWS_SECRET_ACCESS_KEY }}
