name: Testing orchestra

on: push

jobs:
  black:
    runs-on: ubuntu-latest
    steps:
    - uses: actions/checkout@v3
    - uses: psf/black@stable
      with:
        options: "--check"
        version: "22.12.0"
  # flake8:
  #   runs-on: ubuntu-latest
  #   steps:
  #     - uses: actions/checkout@v2
  #     - name: Set up Python
  #       uses: actions/setup-python@v2
  #       with:
  #         python-version: "3.9"
  #     - name: Install deps
  #       uses: knowsuchagency/poetry-install@v1
  #       env:
  #         POETRY_VIRTUALENVS_CREATE: false
  #     - name: Run flake8 check
  #       run: poetry run flake8 --count .
  # mypy:
  #   runs-on: ubuntu-latest
  #   steps:
  #     - uses: actions/checkout@v2
  #     - name: Set up Python
  #       uses: actions/setup-python@v2
  #       with:
  #         python-version: "3.9"
  #     - name: Install deps
  #       uses: knowsuchagency/poetry-install@v1
  #       env:
  #         POETRY_VIRTUALENVS_CREATE: false
  #     - name: Run mypy check
  #       run: poetry run mypy --install-types --non-interactive .
  pytest:
    runs-on: ubuntu-latest-8-cores
    strategy:
      fail-fast: false
      matrix:
        shard: [0, 1, 2, 3, 4, 5, 6, 7]
    environment: orchestra-testing
    env:
      LOGS_DIR: ${{ github.workspace }}/logs
    services:
      orchestra-db:
        image: pgvector/pgvector:pg15
        env:
          POSTGRES_PASSWORD: orchestra
          POSTGRES_USER: orchestra
          POSTGRES_DB: orchestra
        options: >-
          --health-cmd="pg_isready"
          --health-interval=10s
          --health-timeout=5s
          --health-retries=5
        ports:
        - 5432:5432
    steps:

    - uses: actions/checkout@v4
    - name: Auth into Google Cloud
      id: gcp-auth
      uses: 'google-github-actions/auth@v2'
      # This service account also needs pub/sub
      with:
        credentials_json: '${{ secrets.GCP_SERVICE_ACCOUNT_JSON }}'

    - name: Set up Python
      uses: actions/setup-python@v5
      with:
        python-version: "3.12"

    - name: Install Poetry
      run: pip install poetry

    - name: Cache poetry dependencies
      uses: actions/cache@v4
      with:
        path: ~/.cache/pypoetry
        key: poetry-${{ runner.os }}-${{ hashFiles('poetry.lock') }}
        restore-keys: |
          poetry-${{ runner.os }}-

    - name: Install deps
      run: poetry install
      env:
        POETRY_VIRTUALENVS_CREATE: "false"

    - name: Setup logging directory
      run: |
        mkdir -p "$LOGS_DIR/orchestra"
        echo "Created logging directory: $LOGS_DIR/orchestra/"

    - name: Run pytest check
      id: pytest
      run: |
        set +e
        # --color=no ensures no ANSI codes in output (required for summary line parsing)
        poetry run pytest -p no:warnings -vv --color=no --cov="orchestra" -n 8 --shard-id=${{ matrix.shard }} --num-shards=8 . -m "not performance" 2>&1 | tee pytest_output.txt
        exit_code=${PIPESTATUS[0]}
        echo "exit_code=$exit_code" >> $GITHUB_OUTPUT

        # Strip any remaining ANSI codes (from coverage or other plugins) before parsing
        sed -i 's/\x1b\[[0-9;]*m//g' pytest_output.txt

        # Extract pass/fail counts from pytest summary line
        # Format: "====== X passed, Y failed, Z skipped in N.NNs (H:MM:SS) ======"
        summary_line=$(grep -E "^=+ .*(passed|failed).* in [0-9]+(\.[0-9]+)?s" pytest_output.txt | tail -1)
        if [ -n "$summary_line" ]; then
          passed=$(echo "$summary_line" | grep -oE "[0-9]+ passed" | grep -oE "[0-9]+" || echo "0")
          failed=$(echo "$summary_line" | grep -oE "[0-9]+ failed" | grep -oE "[0-9]+" || echo "0")
          skipped=$(echo "$summary_line" | grep -oE "[0-9]+ skipped" | grep -oE "[0-9]+" || echo "0")
          echo "passed=${passed:-0}" >> $GITHUB_OUTPUT
          echo "failed=${failed:-0}" >> $GITHUB_OUTPUT
          echo "skipped=${skipped:-0}" >> $GITHUB_OUTPUT
        else
          # Debug: show last 5 lines to help diagnose parsing issues
          echo "Warning: Could not parse pytest summary line" >&2
          echo "Last 5 lines of output:" >&2
          tail -5 pytest_output.txt >&2
          echo "passed=0" >> $GITHUB_OUTPUT
          echo "failed=0" >> $GITHUB_OUTPUT
          echo "skipped=0" >> $GITHUB_OUTPUT
        fi

        exit $exit_code
      env:
        ORCHESTRA_HOST: "0.0.0.0"
        ORCHESTRA_DB_HOST: localhost
        # Logging
        ORCHESTRA_LOG_DIR: ${{ env.LOGS_DIR }}/orchestra
        # GCP configuration (from org-level variables)
        ORCHESTRA_VERTEXAI_PROJECT: ${{ vars.GCP_PROJECT_ID }}
        # Use step output from google-github-actions/auth@v2 (more explicit than env.GOOGLE_APPLICATION_CREDENTIALS)
        ORCHESTRA_VERTEXAI_SERVICE_ACC_JSON: ${{ steps.gcp-auth.outputs.credentials_file_path }}
        ORCHESTRA_GCP_BUCKET_NAME: ${{ vars.GCP_BUCKET_LOGS }}
        ORCHESTRA_GCP_ASSISTANT_IMAGES_BUCKET_NAME: ${{ vars.GCP_BUCKET_ASSISTANT_IMAGES }}
        ORCHESTRA_GCP_ASSISTANT_RECORDINGS_BUCKET_NAME: ${{ vars.GCP_BUCKET_RECORDINGS }}
        # OpenAI API key (used for embeddings in log search)
        ORCHESTRA_OPENAI_API_KEY: ${{ secrets.ORCHESTRA_OPENAI_API_KEY }}
        # Orchestra-specific configuration
        ORCHESTRA_ADMIN_KEY: ${{ secrets.ORCHESTRA_ADMIN_KEY }}
        AUTH_ACCOUNT_API_KEY: ${{ secrets.AUTH_ACCOUNT_API_KEY }}
        AUTH_ACCOUNT_USER_ID: ${{ secrets.AUTH_ACCOUNT_USER_ID }}

    - name: Generate success summary
      if: success()
      run: |
        ARTIFACTS_URL="https://github.com/${{ github.repository }}/actions/runs/${{ github.run_id }}#artifacts"
        PASSED="${{ steps.pytest.outputs.passed }}"
        SKIPPED="${{ steps.pytest.outputs.skipped }}"

        # Count trace files
        TRACE_COUNT=0
        if [ -d "$LOGS_DIR/orchestra/requests" ]; then
          TRACE_COUNT=$(find "$LOGS_DIR/orchestra/requests" -name "*.json" -type f 2>/dev/null | wc -l | tr -d ' ')
        fi

        echo "## ✅ Shard ${{ matrix.shard }}: All Tests Passed" >> $GITHUB_STEP_SUMMARY
        echo "" >> $GITHUB_STEP_SUMMARY
        if [ "$SKIPPED" -gt 0 ]; then
          echo "**${PASSED}** passed, **${SKIPPED}** skipped" >> $GITHUB_STEP_SUMMARY
        else
          echo "**${PASSED}** passed" >> $GITHUB_STEP_SUMMARY
        fi
        echo "" >> $GITHUB_STEP_SUMMARY
        echo "### 📦 Artifacts" >> $GITHUB_STEP_SUMMARY
        echo "" >> $GITHUB_STEP_SUMMARY
        echo "**${TRACE_COUNT}** request traces captured → [**Download logs-shard-${{ matrix.shard }}**]($ARTIFACTS_URL)" >> $GITHUB_STEP_SUMMARY

    - name: Generate failure summary
      if: failure()
      run: |
        ARTIFACTS_URL="https://github.com/${{ github.repository }}/actions/runs/${{ github.run_id }}#artifacts"
        PASSED="${{ steps.pytest.outputs.passed }}"
        FAILED="${{ steps.pytest.outputs.failed }}"
        SKIPPED="${{ steps.pytest.outputs.skipped }}"

        # Count trace files
        TRACE_COUNT=0
        if [ -d "$LOGS_DIR/orchestra/requests" ]; then
          TRACE_COUNT=$(find "$LOGS_DIR/orchestra/requests" -name "*.json" -type f 2>/dev/null | wc -l | tr -d ' ')
        fi

        echo "## ❌ Shard ${{ matrix.shard }}: Tests Failed" >> $GITHUB_STEP_SUMMARY
        echo "" >> $GITHUB_STEP_SUMMARY
        if [ "$SKIPPED" -gt 0 ]; then
          echo "**${PASSED}** passed, **${FAILED}** failed, **${SKIPPED}** skipped" >> $GITHUB_STEP_SUMMARY
        else
          echo "**${PASSED}** passed, **${FAILED}** failed" >> $GITHUB_STEP_SUMMARY
        fi
        echo "" >> $GITHUB_STEP_SUMMARY
        echo "### 📦 Artifacts" >> $GITHUB_STEP_SUMMARY
        echo "" >> $GITHUB_STEP_SUMMARY
        echo "**${TRACE_COUNT}** request traces captured → [**Download logs-shard-${{ matrix.shard }}**]($ARTIFACTS_URL)" >> $GITHUB_STEP_SUMMARY

    - name: Prepare logs for upload
      if: always()
      run: |
        echo "=== Preparing logs for upload ==="

        if [ -d "$LOGS_DIR/orchestra" ]; then
          # Sanitize filenames for cross-platform compatibility (Windows NTFS).
          # Invalid characters: " : < > | * ? \r \n
          # This is a fallback; the exporter should already sanitize these.
          sanitized=0
          failed=0
          while IFS= read -r -d '' file; do
            dir=$(dirname "$file")
            base=$(basename "$file")
            # Replace all NTFS-invalid characters with underscores
            newbase=$(echo "$base" | tr ':"<>|*?' '_____?_' | tr -d '\r\n')
            newname="$dir/$newbase"
            if [ "$file" != "$newname" ]; then
              if mv "$file" "$newname" 2>&1; then
                ((sanitized++)) || true
              else
                echo "  ⚠ Failed to rename: $file"
                ((failed++)) || true
              fi
            fi
          done < <(find "$LOGS_DIR/orchestra" -type f \( -name '*:*' -o -name '*"*' -o -name '*<*' -o -name '*>*' -o -name '*|*' -o -name '*?*' \) -print0 2>/dev/null || true)

          # Count files by type
          total_files=$(find "$LOGS_DIR/orchestra" -type f 2>/dev/null | wc -l | tr -d ' ')
          trace_files=0
          if [ -d "$LOGS_DIR/orchestra/requests" ]; then
            trace_files=$(find "$LOGS_DIR/orchestra/requests" -name "*.json" -type f 2>/dev/null | wc -l | tr -d ' ')
          fi

          echo "✓ orchestra logs: $total_files files total"
          echo "  - $trace_files request traces (JSON)"
          if [ "$sanitized" -gt 0 ]; then
            echo "  - $sanitized filenames sanitized"
          fi
          if [ "$failed" -gt 0 ]; then
            echo "  ⚠ $failed filenames failed to sanitize"
          fi
        else
          echo "○ orchestra logs: directory not found"
          echo "  (No traces captured - check ORCHESTRA_LOG_DIR env var)"
        fi

        echo "=== Log preparation complete ==="

    - name: Upload logs
      if: always()
      uses: actions/upload-artifact@v4
      with:
        name: logs-shard-${{ matrix.shard }}
        path: logs/
        if-no-files-found: ignore
        retention-days: 90
