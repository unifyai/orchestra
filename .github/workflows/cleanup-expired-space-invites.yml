name: Cleanup Expired Space Invites

on:
  # schedule:
    # Daily at 4:00 AM UTC
    # - cron: '0 4 * * *'
  workflow_dispatch:

jobs:
  cleanup_expired_space_invites:
    name: Cleanup Expired Space Invites
    runs-on: ubuntu-latest

    steps:
    - name: Call cleanup endpoint
      run: |
        response=$(curl -s -w "\n%{http_code}" -X POST \
          "https://api.unify.ai/v0/admin/cleanup/expired-space-invites" \
          -H "Authorization: Bearer ${{ secrets.ORCHESTRA_ADMIN_KEY }}")

        http_code=$(echo "$response" | tail -1)
        body=$(echo "$response" | head -n -1)

        echo "Response: $body"
        echo "HTTP Status: $http_code"

        if [ "$http_code" != "200" ]; then
          echo "::error::Cleanup failed with status $http_code"
          exit 1
        fi
