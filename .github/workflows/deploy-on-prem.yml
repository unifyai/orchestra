name: On-prem Docker Build

on:
  schedule:
    # runs everyday at 23:00 UTC
  - cron: '0 23 * * *'
  workflow_dispatch:

jobs:

  build:
    name: On-prem Docker Build
    runs-on: ubuntu-latest

    steps:
    - uses: actions/checkout@v2

    - name: Auth into Google Cloud
      uses: 'google-github-actions/auth@v2'
      with:
        credentials_json: '${{ secrets.GCP_DEFAULT_CREDENTIALS }}'

    - name: Set up Google Cloud SDK
      uses: google-github-actions/setup-gcloud@v2
      with:
        version: 'latest'
        project_id: saas-368716

    - name: Login to Docker Hub
      uses: docker/login-action@v2
      with:
        username: ${{ secrets.DOCKERHUB_USERNAME }}
        password: ${{ secrets.DOCKERHUB_TOKEN }}

    - name: Gcloud login
      run: |
        gcloud auth configure-docker europe-west3-docker.pkg.dev

    - name: Pull and Push Orchestra Image
      run: |
        docker pull europe-west3-docker.pkg.dev/saas-368716/cloud-run-source-deploy/orchestra/orchestra:latest
        docker tag europe-west3-docker.pkg.dev/saas-368716/cloud-run-source-deploy/orchestra/orchestra:latest unifyai/orchestra-on-prem:latest
        docker push unifyai/orchestra-on-prem:latest

    - name: Pull and Push Console Image
      run: |
        docker pull europe-west3-docker.pkg.dev/saas-368716/cloud-run-source-deploy/unify-interfaces/saas-web-app:latest
        docker tag europe-west3-docker.pkg.dev/saas-368716/cloud-run-source-deploy/unify-interfaces/saas-web-app:latest unifyai/unify-interfaces-on-prem:latest
        docker push unifyai/unify-interfaces-on-prem:latest

    - name: Build and push Dataset Evaluation Image
      run: |
        cd dataset_evaluation
        docker build -t unifyai/dataset-evaluation-on-prem:latest -f Dockerfile .
        docker push unifyai/dataset-evaluation-on-prem:latest
