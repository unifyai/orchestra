name: Update LiteLLM

on:
  push:
    branches:
    - main
  schedule:
    # runs everyday at 23:00 UTC
  - cron: '0 23 * * *'
  workflow_dispatch:
permissions:
  contents: write

jobs:
  update_litellm:
    name: Update LiteLLM
    runs-on: ubuntu-latest

    steps:
    - name: Checkout
      uses: actions/checkout@v3
      with:
        ssh-key: '${{ secrets.SSH_ORCHESTRA_PUSH }}'

    - name: Set up Python
      uses: actions/setup-python@v2
      with:
        python-version: "3.9"

    - name: Set up SSH key
      env:
        SSH_AUTH_SOCK: /tmp/ssh_agent.sock
      run: |
        mkdir -p ~/.ssh
        echo "${{ secrets.SSH_ORCHESTRA_PUSH }}" > ~/.ssh/id_rsa
        chmod 600 ~/.ssh/id_rsa
        ssh-keyscan github.com >> ~/.ssh/known_hosts
        eval "$(ssh-agent -s)"
        ssh-add ~/.ssh/id_rsa

    - name: Install deps
      uses: knowsuchagency/poetry-install@v1
      env:
        POETRY_VIRTUALENVS_CREATE: false

    - name: Update LiteLLM
      id: update_litellm
      if: github.event_name != 'push'  # Only update on schedule or manual trigger
      run: |
        poetry add litellm@latest
        git add .
        git diff --cached --quiet || echo "output_value=changes" >> $GITHUB_OUTPUT

    - name: Debug mode - simulate changes
      id: debug_mode
      if: github.event_name == 'push'  # Only in debug mode for push events
      run: |
        echo "DEBUG MODE: Simulating changes without updating LiteLLM"
        echo "output_value=changes" >> $GITHUB_OUTPUT

    - name: Push the changes if required
      if: steps.update_litellm.outputs.output_value == 'changes' || steps.debug_mode.outputs.output_value == 'changes'
      run: |
        echo "=== Debug: Pre-push context ==="
        echo "Current github.actor: ${{ github.actor }}"
        echo "Current github.event_name: ${{ github.event_name }}"
        echo "Current workflow: ${{ github.workflow }}"
        echo "Current job: ${{ github.job }}"
        echo ""

        git config --global user.name "unify-dev-bot"
        git config --global user.email "github-bot@unify.ai"

        # In debug mode, create a dummy commit
        if [ "${{ github.event_name }}" == "push" ]; then
          echo "DEBUG: Test trigger at $(date)" >> .github/workflows/debug-trigger.txt
          git add .github/workflows/debug-trigger.txt
          git commit -m "DEBUG: Test commit from update-litellm workflow (should trigger staging-sync)"
        else
          git add .
          git commit -m "litellm update [skip-staging-sync]"
        fi

        echo "=== Debug: About to push ==="
        echo "Git user.name: $(git config user.name)"
        echo "Git user.email: $(git config user.email)"
        echo "Latest commit message: $(git log -1 --pretty=%B)"
        echo "Latest commit author: $(git log -1 --pretty=%an)"
        echo "Latest commit email: $(git log -1 --pretty=%ae)"
        echo ""

        git push origin main
