name: Update LiteLLM

on:
  schedule:
    # runs everyday at 23:00 UTC
  - cron: '0 23 * * *'
  workflow_dispatch:
permissions:
  contents: write

jobs:
  update_litellm:
    name: Update LiteLLM
    runs-on: ubuntu-latest

    steps:
    - name: Checkout
      uses: actions/checkout@v3

    - name: Set up Python
      uses: actions/setup-python@v2
      with:
        python-version: "3.9"

    - name: Set up SSH key
      env:
        SSH_AUTH_SOCK: /tmp/ssh_agent.sock
      run: |
        mkdir -p ~/.ssh
        echo "${{ secrets.SSH_ORCHESTRA_PUSH }}" > ~/.ssh/id_rsa
        chmod 600 ~/.ssh/id_rsa
        ssh-keyscan github.com >> ~/.ssh/known_hosts
        eval "$(ssh-agent -s)"
        ssh-add ~/.ssh/id_rsa

    - name: Install deps
      uses: knowsuchagency/poetry-install@v1
      env:
        POETRY_VIRTUALENVS_CREATE: false

    - name: Update LiteLLM
      id: update_litellm
      run: |
        poetry add litellm@latest
        git add .
        git diff --cached --quiet || echo "output_value=changes" >> $GITHUB_OUTPUT

    - name: Push the changes if required
      if: steps.update_litellm.outputs.output_value == 'changes'
      run: |
        git config --global user.name "vedpatwardhan"
        git config --global user.email "vedpat3@gmail.com"
        git add .
        git commit -m "litellm update"
        git push origin main
