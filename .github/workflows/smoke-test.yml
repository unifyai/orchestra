name: Smoke Test

on:
  schedule:
    # runs everyday at 23:00 UTC
  - cron: '0 0,12 * * *'
  workflow_dispatch:
permissions:
  contents: write

jobs:
  update_litellm:
    name: Update LiteLLM
    runs-on: ubuntu-latest

    steps:
    - name: Checkout
      uses: actions/checkout@v3
      with:
        submodules: 'true'

    - name: Set up Python
      uses: actions/setup-python@v2
      with:
        python-version: "3.9"

    - name: Run the tests
      run: |
        export API_KEY=${{ secrets.USER_API_KEY }}
        python3 -m pip install requests
        python3 test_all_endpoints.py
