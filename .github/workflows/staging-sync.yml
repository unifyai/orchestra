name: Syncing staging environment
on:
  push:
    branches:
    - main
permissions:
  contents: write

jobs:
  sync:
    name: Sync
    runs-on: ubuntu-latest
    steps:
    - name: Checkout
      uses: actions/checkout@v3

    - name: Sync
      run: |
        git checkout -b staging
        git push -f origin staging
