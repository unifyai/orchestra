name: Syncing staging environment
on:
  # push:
  #   branches:
  #   - main
  workflow_dispatch:
permissions:
  contents: write

jobs:
  sync:
    name: Sync
    runs-on: ubuntu-latest
    if: |
      github.event_name == 'workflow_dispatch' ||
      (github.event_name == 'push' &&
       github.actor != 'unify-dev-bot')
    steps:
    - name: Checkout
      uses: actions/checkout@v3

    - name: Sync
      run: |
        git checkout -b staging
        git push -f origin staging
