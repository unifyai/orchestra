# Cloud Build pipeline for preview-environment Orchestra revisions.
#
# Triggered on push to ``feature/*`` branches.  Builds the orchestra
# image and deploys it as a Cloud Run preview revision against the
# existing ``orchestra-staging`` service with ``--no-traffic``, so the
# canonical staging URL keeps serving the un-tagged revision. The slug
# tag is assigned only after the preview revision is ready.
#
# Cloud Run Jobs (``orchestra-staging-migrator``,
# ``orchestra-staging-index-maintenance-reindex``) are intentionally
# left alone.  Preview revisions assume schema migrations have already
# been applied to the shared staging Cloud SQL instance via the regular
# staging deploy.
steps:
- name: gcr.io/cloud-builders/docker
  id: compute-slug
  entrypoint: bash
  args:
  - -c
  - |
    set -euo pipefail
    SLUG=$(echo "${BRANCH_NAME}" \
      | sed -E 's|^feature/||; s|[^a-z0-9-]+|-|g; s|^-+||; s|-+$||' \
      | tr '[:upper:]' '[:lower:]' \
      | cut -c1-30 \
      | sed -E 's|-+$||')
    if [ -z "$$SLUG" ]; then
      echo "ERROR: empty preview slug from branch name '${BRANCH_NAME}'" >&2
      exit 1
    fi
    echo "$$SLUG" > /workspace/slug.txt
    echo "preview slug: $$SLUG"
  waitFor: ['-']

- name: gcr.io/cloud-builders/docker
  id: pull-cache
  entrypoint: bash
  args:
  - -c
  - 'docker pull $_AR_HOSTNAME/$PROJECT_ID/cloud-run-source-deploy/$REPO_NAME/$_SERVICE_NAME:latest || true'
  waitFor: ['-']

- name: gcr.io/cloud-builders/docker
  id: build-image
  entrypoint: bash
  args:
  - -c
  - |
    set -euo pipefail
    SLUG=$(cat /workspace/slug.txt)
    DOCKER_BUILDKIT=1 docker build \
      --cache-from $_AR_HOSTNAME/$PROJECT_ID/cloud-run-source-deploy/$REPO_NAME/$_SERVICE_NAME:latest \
      --build-arg BUILDKIT_INLINE_CACHE=1 \
      -t $_AR_HOSTNAME/$PROJECT_ID/cloud-run-source-deploy/$REPO_NAME/$_SERVICE_NAME:preview-$${SLUG}-$COMMIT_SHA \
      -f deploy/Dockerfile --target prod .
  waitFor: ['compute-slug', 'pull-cache']

- name: gcr.io/cloud-builders/docker
  id: push-image
  entrypoint: bash
  args:
  - -c
  - |
    set -euo pipefail
    SLUG=$(cat /workspace/slug.txt)
    docker push $_AR_HOSTNAME/$PROJECT_ID/cloud-run-source-deploy/$REPO_NAME/$_SERVICE_NAME:preview-$${SLUG}-$COMMIT_SHA
  waitFor: ['build-image']

- name: gcr.io/google.com/cloudsdktool/cloud-sdk:slim
  id: repair-traffic-state
  entrypoint: bash
  args:
  - -c
  - |
    set -euo pipefail
    run_cloud_run_with_retry() {
      local attempt max_attempts delay output output_file sleep_for status
      max_attempts=5
      delay=5
      for attempt in $$(seq 1 "$$max_attempts"); do
        output_file=$$(mktemp)
        set +e
        (set -e; "$${@}") > "$$output_file" 2>&1
        status=$$?
        set -e
        output=$$(cat "$$output_file")
        rm -f "$$output_file"
        printf '%s\n' "$$output"
        if [ "$$status" -eq 0 ]; then
          return 0
        fi
        if [[ "$$output" != *"ABORTED: Conflict for resource"* || "$$output" != *"was specified but current version is"* || "$$attempt" -eq "$$max_attempts" ]]; then
          return "$$status"
        fi
        sleep_for=$$((delay + RANDOM % 5))
        echo "Cloud Run service changed concurrently; retrying in $${sleep_for}s before attempt $$((attempt + 1))/$$max_attempts" >&2
        sleep "$$sleep_for"
        delay=$$((delay * 2))
      done
    }
    repair_traffic_state() {
    SERVICE_JSON=/tmp/service.json
    gcloud run services describe $_SERVICE_NAME \
      --region=$_DEPLOY_REGION \
      --platform=managed \
      --format=json > "$$SERVICE_JSON"
    python3 - "$$SERVICE_JSON" > /tmp/traffic-args.txt <<'PY'
    import json
    import sys

    with open(sys.argv[1], encoding="utf-8") as service_file:
        service = json.load(service_file)

    revisions: list[str] = []
    status_tags: dict[str, str] = {}
    for entry in service.get("status", {}).get("traffic", []):
        revision = entry.get("revisionName")
        if not revision:
            continue
        percent = entry.get("percent")
        if percent is not None and int(percent) > 0:
            revisions.append(f"{revision}={int(percent)}")
        tag = entry.get("tag")
        if tag:
            status_tags[tag] = revision

    if not revisions:
        raise SystemExit("No live traffic revision found to preserve")

    spec_tags = {
        entry["tag"]: entry.get("revisionName")
        for entry in service.get("spec", {}).get("traffic", [])
        if entry.get("tag")
    }
    update_tags = [
        f"{tag}={revision}"
        for tag, revision in sorted(status_tags.items())
        if spec_tags.get(tag) != revision
    ]
    remove_tags = sorted(
        tag for tag in spec_tags
        if tag not in status_tags
    )

    print("--to-revisions=" + ",".join(revisions))
    if update_tags:
        print("--update-tags=" + ",".join(update_tags))
    if remove_tags:
        print("--remove-tags=" + ",".join(remove_tags))
    PY
    mapfile -t TRAFFIC_ARGS < /tmp/traffic-args.txt
    run_cloud_run_with_retry gcloud run services update-traffic $_SERVICE_NAME \
      --region=$_DEPLOY_REGION \
      --platform=managed \
      "$${TRAFFIC_ARGS[@]}" \
      --quiet
    }
    run_cloud_run_with_retry repair_traffic_state
  waitFor: ['push-image']

- name: gcr.io/google.com/cloudsdktool/cloud-sdk:slim
  id: deploy-preview
  entrypoint: bash
  args:
  - -c
  - |
    set -euo pipefail
    run_cloud_run_with_retry() {
      local attempt max_attempts delay output output_file sleep_for status
      max_attempts=5
      delay=5
      for attempt in $$(seq 1 "$$max_attempts"); do
        output_file=$$(mktemp)
        set +e
        (set -e; "$${@}") > "$$output_file" 2>&1
        status=$$?
        set -e
        output=$$(cat "$$output_file")
        rm -f "$$output_file"
        printf '%s\n' "$$output"
        if [ "$$status" -eq 0 ]; then
          return 0
        fi
        if [[ "$$output" != *"ABORTED: Conflict for resource"* || "$$output" != *"was specified but current version is"* || "$$attempt" -eq "$$max_attempts" ]]; then
          return "$$status"
        fi
        sleep_for=$$((delay + RANDOM % 5))
        echo "Cloud Run service changed concurrently; retrying in $${sleep_for}s before attempt $$((attempt + 1))/$$max_attempts" >&2
        sleep "$$sleep_for"
        delay=$$((delay * 2))
      done
    }
    SLUG=$(cat /workspace/slug.txt)
    SERVICE_NAME=$_SERVICE_NAME
    BUILD_PART=$(printf '%s' "$BUILD_ID" | cut -c1-8)
    MAX_SUFFIX_LEN=$((63 - $${#SERVICE_NAME} - 1))
    MAX_SLUG_LEN=$((MAX_SUFFIX_LEN - $${#BUILD_PART} - 3))
    if [ "$$MAX_SLUG_LEN" -lt 1 ]; then
      echo "No room for preview revision suffix on service $$SERVICE_NAME" >&2
      exit 1
    fi
    REVISION_SLUG=$(printf '%s' "$$SLUG" | cut -c1-$$MAX_SLUG_LEN)
    REVISION_SUFFIX="p-$${REVISION_SLUG}-$${BUILD_PART}"
    REVISION="$${SERVICE_NAME}-$${REVISION_SUFFIX}"
    echo "$$REVISION" > /workspace/preview-revision.txt
    COMMS_URL="https://$${SLUG}---$_PEER_COMMS_HOST"
    ADAPTERS_URL="https://$${SLUG}---$_PEER_ADAPTERS_HOST"
    CANONICAL_IMAGE=$_AR_HOSTNAME/$PROJECT_ID/cloud-run-source-deploy/$REPO_NAME/$_SERVICE_NAME:latest
    if ! run_cloud_run_with_retry gcloud run deploy $_SERVICE_NAME \
      --image=$_AR_HOSTNAME/$PROJECT_ID/cloud-run-source-deploy/$REPO_NAME/$_SERVICE_NAME:preview-$${SLUG}-$COMMIT_SHA \
      --region=$_DEPLOY_REGION \
      --platform=managed \
      --revision-suffix=$$REVISION_SUFFIX \
      --no-traffic \
      --vpc-connector=orchestra-connector-v2 \
      --vpc-egress=all-traffic \
      --no-cpu-throttling \
      --cpu-boost \
      --labels=managed-by=gcp-cloud-build-deploy-cloud-run,commit-sha=$COMMIT_SHA,gcb-build-id=$BUILD_ID,preview=true \
      --remove-env-vars=UNITY_COMMS_URL,UNITY_ADAPTERS_URL \
      --update-env-vars=ORCHESTRA_CLOUD_SQL_INSTANCE=$_CLOUDSQL_INSTANCE,BRANCH_TAG=$${SLUG},UNITY_COMMS_URL=$${COMMS_URL},UNITY_ADAPTERS_URL=$${ADAPTERS_URL} \
      --quiet; then
      echo "preview deploy failed; restoring canonical service template"
      run_cloud_run_with_retry gcloud run services update $_SERVICE_NAME \
        --region=$_DEPLOY_REGION --platform=managed \
        --image="$$CANONICAL_IMAGE" \
        --labels=managed-by=gcp-cloud-build-deploy-cloud-run,gcb-build-id=$BUILD_ID,preview-restore=true \
        --remove-env-vars=BRANCH_TAG \
        --update-env-vars=UNITY_COMMS_URL=https://$_PEER_COMMS_HOST,UNITY_ADAPTERS_URL=https://$_PEER_ADAPTERS_HOST \
        --quiet
      exit 1
    fi
    echo "preview revision URL: https://$${SLUG}.$_SERVICE_HOST"
  waitFor: ['repair-traffic-state']

- name: gcr.io/google.com/cloudsdktool/cloud-sdk:slim
  id: assign-preview-tag
  entrypoint: bash
  args:
  - -c
  - |
    set -euo pipefail
    run_cloud_run_with_retry() {
      local attempt max_attempts delay output output_file sleep_for status
      max_attempts=5
      delay=5
      for attempt in $$(seq 1 "$$max_attempts"); do
        output_file=$$(mktemp)
        set +e
        (set -e; "$${@}") > "$$output_file" 2>&1
        status=$$?
        set -e
        output=$$(cat "$$output_file")
        rm -f "$$output_file"
        printf '%s\n' "$$output"
        if [ "$$status" -eq 0 ]; then
          return 0
        fi
        if [[ "$$output" != *"ABORTED: Conflict for resource"* || "$$output" != *"was specified but current version is"* || "$$attempt" -eq "$$max_attempts" ]]; then
          return "$$status"
        fi
        sleep_for=$$((delay + RANDOM % 5))
        echo "Cloud Run service changed concurrently; retrying in $${sleep_for}s before attempt $$((attempt + 1))/$$max_attempts" >&2
        sleep "$$sleep_for"
        delay=$$((delay * 2))
      done
    }
    SLUG=$(cat /workspace/slug.txt)
    REVISION=$(cat /workspace/preview-revision.txt)
    CANONICAL_IMAGE=$_AR_HOSTNAME/$PROJECT_ID/cloud-run-source-deploy/$REPO_NAME/$_SERVICE_NAME:latest
    if ! run_cloud_run_with_retry gcloud run services update-traffic $_SERVICE_NAME \
      --region=$_DEPLOY_REGION \
      --platform=managed \
      --update-tags="$${SLUG}=$${REVISION}" \
      --quiet; then
      echo "preview tag assignment failed; restoring canonical service template"
      run_cloud_run_with_retry gcloud run services update $_SERVICE_NAME \
        --region=$_DEPLOY_REGION --platform=managed \
        --image="$$CANONICAL_IMAGE" \
        --labels=managed-by=gcp-cloud-build-deploy-cloud-run,gcb-build-id=$BUILD_ID,preview-restore=true \
        --remove-env-vars=BRANCH_TAG \
        --update-env-vars=UNITY_COMMS_URL=https://$_PEER_COMMS_HOST,UNITY_ADAPTERS_URL=https://$_PEER_ADAPTERS_HOST \
        --quiet
      exit 1
    fi
  waitFor: ['deploy-preview']

# Reset the shared service template back to the canonical staging image
# and canonical peer URLs, undoing the env-var mutation that
# ``gcloud run deploy --update-env-vars=...`` applied to the template
# in ``deploy-preview``.  The canonical image is referenced by the
# ``:latest`` tag, which the canonical staging cloudbuild publishes on
# every push and the Artifact Registry cleanup policy protects from
# garbage collection.  The slug-tagged revision keeps its own immutable
# env snapshot and remains reachable via its tag URL.
- name: gcr.io/google.com/cloudsdktool/cloud-sdk:slim
  id: restore-canonical-template
  entrypoint: bash
  args:
  - -c
  - |
    set -euo pipefail
    run_cloud_run_with_retry() {
      local attempt max_attempts delay output output_file sleep_for status
      max_attempts=5
      delay=5
      for attempt in $$(seq 1 "$$max_attempts"); do
        output_file=$$(mktemp)
        set +e
        (set -e; "$${@}") > "$$output_file" 2>&1
        status=$$?
        set -e
        output=$$(cat "$$output_file")
        rm -f "$$output_file"
        printf '%s\n' "$$output"
        if [ "$$status" -eq 0 ]; then
          return 0
        fi
        if [[ "$$output" != *"ABORTED: Conflict for resource"* || "$$output" != *"was specified but current version is"* || "$$attempt" -eq "$$max_attempts" ]]; then
          return "$$status"
        fi
        sleep_for=$$((delay + RANDOM % 5))
        echo "Cloud Run service changed concurrently; retrying in $${sleep_for}s before attempt $$((attempt + 1))/$$max_attempts" >&2
        sleep "$$sleep_for"
        delay=$$((delay * 2))
      done
    }
    CANONICAL_IMAGE=$_AR_HOSTNAME/$PROJECT_ID/cloud-run-source-deploy/$REPO_NAME/$_SERVICE_NAME:latest
    run_cloud_run_with_retry gcloud run services update $_SERVICE_NAME \
      --region=$_DEPLOY_REGION --platform=managed \
      --image="$$CANONICAL_IMAGE" \
      --labels=managed-by=gcp-cloud-build-deploy-cloud-run,gcb-build-id=$BUILD_ID,preview-restore=true \
      --remove-env-vars=BRANCH_TAG \
      --update-env-vars=UNITY_COMMS_URL=https://$_PEER_COMMS_HOST,UNITY_ADAPTERS_URL=https://$_PEER_ADAPTERS_HOST \
      --quiet
    echo "canonical service template restored to image $$CANONICAL_IMAGE"
  waitFor: ['assign-preview-tag']

- name: gcr.io/google.com/cloudsdktool/cloud-sdk:slim
  id: restore-canonical-traffic
  entrypoint: bash
  args:
  - -c
  - |
    set -euo pipefail
    run_cloud_run_with_retry() {
      local attempt max_attempts delay output output_file sleep_for status
      max_attempts=5
      delay=5
      for attempt in $$(seq 1 "$$max_attempts"); do
        output_file=$$(mktemp)
        set +e
        (set -e; "$${@}") > "$$output_file" 2>&1
        status=$$?
        set -e
        output=$$(cat "$$output_file")
        rm -f "$$output_file"
        printf '%s\n' "$$output"
        if [ "$$status" -eq 0 ]; then
          return 0
        fi
        if [[ "$$output" != *"ABORTED: Conflict for resource"* || "$$output" != *"was specified but current version is"* || "$$attempt" -eq "$$max_attempts" ]]; then
          return "$$status"
        fi
        sleep_for=$$((delay + RANDOM % 5))
        echo "Cloud Run service changed concurrently; retrying in $${sleep_for}s before attempt $$((attempt + 1))/$$max_attempts" >&2
        sleep "$$sleep_for"
        delay=$$((delay * 2))
      done
    }
    route_canonical_traffic() {
      REVISION=$$(gcloud run services describe $_SERVICE_NAME \
        --region=$_DEPLOY_REGION \
        --platform=managed \
        --format="value(status.latestCreatedRevisionName)")
      if [ -z "$$REVISION" ]; then
        echo "No canonical restore revision found for build $BUILD_ID" >&2
        return 1
      fi
      REVISION_BUILD_ID=$$(gcloud run revisions describe "$$REVISION" \
        --region=$_DEPLOY_REGION \
        --format="value(metadata.labels.gcb-build-id)")
      REVISION_PREVIEW_RESTORE=$$(gcloud run revisions describe "$$REVISION" \
        --region=$_DEPLOY_REGION \
        --format="value(metadata.labels.preview-restore)")
      if [ "$$REVISION_BUILD_ID" != "$BUILD_ID" ] || [ "$$REVISION_PREVIEW_RESTORE" != "true" ]; then
        echo "Skipping traffic restore for $$REVISION because it is not this build's restore revision"
        return 0
      fi
      gcloud run services update-traffic $_SERVICE_NAME \
        --region=$_DEPLOY_REGION \
        --platform=managed \
        --to-revisions="$$REVISION=100" \
        --quiet
      echo "canonical traffic restored to revision $$REVISION"
    }
    run_cloud_run_with_retry route_canonical_traffic
  waitFor: ['restore-canonical-template']

options:
  substitutionOption: ALLOW_LOOSE
  defaultLogsBucketBehavior: REGIONAL_USER_OWNED_BUCKET

substitutions:
  _SERVICE_NAME: orchestra-staging
  REPO_NAME: orchestra
  _DEPLOY_REGION: europe-west1
  _AR_HOSTNAME: europe-west3-docker.pkg.dev
  _CLOUDSQL_INSTANCE: saas-368716:europe-west3:staging-ssd
  _SERVICE_HOST: api.staging.internal.saas.unify.ai
  _PEER_COMMS_HOST: unity-comms-app-staging-ky4ja5fxna-uc.a.run.app
  _PEER_ADAPTERS_HOST: unity-adapters-staging-ky4ja5fxna-uc.a.run.app

tags:
- gcp-cloud-build-deploy-cloud-run
- gcp-cloud-build-deploy-cloud-run-managed
- orchestra
- preview

timeout: '1200s'
