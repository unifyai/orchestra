services:
  api:
    environment:
      # Adds opentelemetry endpoint.
      ORCHESTRA_OPENTELEMETRY_ENDPOINT: "http://jaeger:4318/v1/traces"
      ORCHESTRA_OPENTELEMETRY_SECURE: "True"

  jaeger:
    image: jaegertracing/all-in-one:1.52
    hostname: jaeger
    ports:
      # Jaeger UI
    - 16686:16686
