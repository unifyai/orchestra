steps:
- name: gcr.io/cloud-builders/docker
  entrypoint: 'bash'
  args: ['-c', 'docker pull $_AR_HOSTNAME/$PROJECT_ID/cloud-run-source-deploy/$REPO_NAME/$_SERVICE_NAME:latest || true']
  id: Pull Docker Cache
- name: gcr.io/cloud-builders/docker
  entrypoint: 'bash'
  args:
  - '-c'
  - |
    DOCKER_BUILDKIT=1 docker build \
      --cache-from $_AR_HOSTNAME/$PROJECT_ID/cloud-run-source-deploy/$REPO_NAME/$_SERVICE_NAME:latest \
      --build-arg BUILDKIT_INLINE_CACHE=1 \
      -t $_AR_HOSTNAME/$PROJECT_ID/cloud-run-source-deploy/$REPO_NAME/$_SERVICE_NAME:$COMMIT_SHA \
      -f deploy/Dockerfile --target prod .
  id: Build Orchestra
- name: gcr.io/cloud-builders/docker
  args:
  - push
  - >-
    $_AR_HOSTNAME/$PROJECT_ID/cloud-run-source-deploy/$REPO_NAME/$_SERVICE_NAME:$COMMIT_SHA
  id: Push Orchestra
  waitFor:
  - 'Build Orchestra'
- name: gcr.io/cloud-builders/docker
  args: ['tag', '$_AR_HOSTNAME/$PROJECT_ID/cloud-run-source-deploy/$REPO_NAME/$_SERVICE_NAME:$COMMIT_SHA', '$_AR_HOSTNAME/$PROJECT_ID/cloud-run-source-deploy/$REPO_NAME/$_SERVICE_NAME:latest']
  id: Build Orchestra Latest
  waitFor:
  - 'Push Orchestra'
- name: gcr.io/cloud-builders/docker
  args:
  - push
  - >-
    $_AR_HOSTNAME/$PROJECT_ID/cloud-run-source-deploy/$REPO_NAME/$_SERVICE_NAME:latest
  id: Push Orchestra Latest
  waitFor:
  - 'Build Orchestra Latest'
- name: 'gcr.io/google.com/cloudsdktool/cloud-sdk:slim'
  args:
  - run
  - jobs
  - update
  - $_JOB_NAME
  - >-
    --image=$_AR_HOSTNAME/$PROJECT_ID/cloud-run-source-deploy/$REPO_NAME/$_SERVICE_NAME:$COMMIT_SHA
  - >-
    --labels=managed-by=gcp-cloud-build-deploy-cloud-run,commit-sha=$COMMIT_SHA,gcb-build-id=$BUILD_ID,gcb-trigger-id=$_TRIGGER_ID
  - '--region=$_JOB_REGION'
  - '--set-cloudsql-instances=$_CLOUDSQL_INSTANCE'
  - '--update-env-vars=ORCHESTRA_CLOUD_SQL_INSTANCE=$_CLOUDSQL_INSTANCE'
  - '--quiet'
  id: Update migration image
  entrypoint: gcloud
  waitFor:
  - 'Push Orchestra'
- name: 'gcr.io/google.com/cloudsdktool/cloud-sdk:slim'
  args:
  - run
  - jobs
  - update
  - $_REINDEX_JOB_NAME
  - >-
    --image=$_AR_HOSTNAME/$PROJECT_ID/cloud-run-source-deploy/$REPO_NAME/$_SERVICE_NAME:$COMMIT_SHA
  - '--region=$_JOB_REGION'
  - '--quiet'
  id: Update reindex job image
  entrypoint: gcloud
  waitFor:
  - 'Push Orchestra'
- name: 'gcr.io/google.com/cloudsdktool/cloud-sdk:slim'
  args:
  - run
  - jobs
  - execute
  - $_JOB_NAME
  - '--region=$_JOB_REGION'
  - '--wait'
  id: Migrate
  entrypoint: gcloud
  waitFor:
  - 'Update migration image'
- name: 'gcr.io/google.com/cloudsdktool/cloud-sdk:slim'
  args:
  - '-c'
  - |
    set -euo pipefail
    SERVICE_JSON=/tmp/service.json
    gcloud run services describe $_SERVICE_NAME \
      --region=$_DEPLOY_REGION \
      --platform=managed \
      --format=json > "$$SERVICE_JSON"
    python3 - "$$SERVICE_JSON" > /tmp/traffic-args.txt <<'PY'
    import json
    import sys

    with open(sys.argv[1], encoding="utf-8") as service_file:
        service = json.load(service_file)

    revisions: list[str] = []
    status_tags: dict[str, str] = {}
    for entry in service.get("status", {}).get("traffic", []):
        revision = entry.get("revisionName")
        if not revision:
            continue
        percent = entry.get("percent")
        if percent is not None and int(percent) > 0:
            revisions.append(f"{revision}={int(percent)}")
        tag = entry.get("tag")
        if tag:
            status_tags[tag] = revision

    if not revisions:
        raise SystemExit("No live traffic revision found to preserve")

    spec_tags = {
        entry["tag"]: entry.get("revisionName")
        for entry in service.get("spec", {}).get("traffic", [])
        if entry.get("tag")
    }
    update_tags = [
        f"{tag}={revision}"
        for tag, revision in sorted(status_tags.items())
        if spec_tags.get(tag) != revision
    ]
    remove_tags = sorted(
        tag for tag in spec_tags
        if tag not in status_tags
    )

    print("--to-revisions=" + ",".join(revisions))
    if update_tags:
        print("--update-tags=" + ",".join(update_tags))
    if remove_tags:
        print("--remove-tags=" + ",".join(remove_tags))
    PY
    mapfile -t TRAFFIC_ARGS < /tmp/traffic-args.txt
    gcloud run services update-traffic $_SERVICE_NAME \
      --region=$_DEPLOY_REGION \
      --platform=managed \
      "$${TRAFFIC_ARGS[@]}" \
      --quiet
  id: Repair Traffic State
  entrypoint: bash
  waitFor:
  - 'Migrate'
  - 'Push Orchestra Latest'
- name: 'gcr.io/google.com/cloudsdktool/cloud-sdk:slim'
  args:
  - run
  - services
  - update
  - $_SERVICE_NAME
  - '--platform=managed'
  - >-
    --image=$_AR_HOSTNAME/$PROJECT_ID/cloud-run-source-deploy/$REPO_NAME/$_SERVICE_NAME:$COMMIT_SHA
  - >-
    --labels=managed-by=gcp-cloud-build-deploy-cloud-run,commit-sha=$COMMIT_SHA,gcb-build-id=$BUILD_ID,gcb-trigger-id=$_TRIGGER_ID
  - '--region=$_DEPLOY_REGION'
  - '--quiet'
  - '--vpc-connector=orchestra-connector-v2'
  - '--vpc-egress=all-traffic'
  - '--no-cpu-throttling'
  - '--cpu-boost'
  - '--update-env-vars=ORCHESTRA_CLOUD_SQL_INSTANCE=$_CLOUDSQL_INSTANCE'
  id: Deploy Orchestra
  entrypoint: gcloud
  waitFor:
  - 'Repair Traffic State'
- name: 'gcr.io/google.com/cloudsdktool/cloud-sdk:slim'
  args:
  - '-c'
  - |
    set -euo pipefail
    REVISION=$$(gcloud run services describe $_SERVICE_NAME \
      --region=$_DEPLOY_REGION \
      --platform=managed \
      --format="value(status.latestCreatedRevisionName)")
    if [ -z "$$REVISION" ]; then
      echo "No deployed revision found for build $BUILD_ID" >&2
      exit 1
    fi
    REVISION_BUILD_ID=$$(gcloud run revisions describe "$$REVISION" \
      --region=$_DEPLOY_REGION \
      --format="value(metadata.labels.gcb-build-id)")
    if [ "$$REVISION_BUILD_ID" != "$BUILD_ID" ]; then
      echo "Skipping traffic route for $$REVISION because it belongs to build $$REVISION_BUILD_ID"
      exit 0
    fi
    gcloud run services update-traffic $_SERVICE_NAME \
      --platform=managed \
      --region=$_DEPLOY_REGION \
      --to-revisions="$$REVISION=100" \
      --quiet
  id: Route Orchestra Traffic
  entrypoint: bash
  waitFor:
  - 'Deploy Orchestra'
images:
- $_AR_HOSTNAME/$PROJECT_ID/cloud-run-source-deploy/$REPO_NAME/$_SERVICE_NAME:$COMMIT_SHA
- $_AR_HOSTNAME/$PROJECT_ID/cloud-run-source-deploy/$REPO_NAME/$_SERVICE_NAME:latest
options:
  substitutionOption: ALLOW_LOOSE
  defaultLogsBucketBehavior: REGIONAL_USER_OWNED_BUCKET
substitutions:
  _JOB_REGION: europe-west3
  _SERVICE_NAME: orchestra-staging
  _TRIGGER_ID: 0bfee4b7-25c8-453a-8484-fca72480864c
  REPO_NAME: orchestra
  _DEPLOY_REGION: europe-west1
  _AR_HOSTNAME: europe-west3-docker.pkg.dev
  _PLATFORM: managed
  _JOB_NAME: orchestra-staging-migrator
  _REINDEX_JOB_NAME: orchestra-staging-index-maintenance-reindex
  _CLOUDSQL_INSTANCE: saas-368716:europe-west3:staging-ssd
tags:
- gcp-cloud-build-deploy-cloud-run
- gcp-cloud-build-deploy-cloud-run-managed
- orchestra
