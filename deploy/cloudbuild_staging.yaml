steps:
# Step 1: Reorganize workspace - move orchestra into subdirectory
- name: 'gcr.io/cloud-builders/git'
  id: Reorganize workspace
  entrypoint: 'bash'
  args:
  - '-c'
  - |
    mkdir -p /tmp/orchestra-files
    shopt -s dotglob
    mv * /tmp/orchestra-files/ 2>/dev/null || true
    mkdir orchestra
    mv /tmp/orchestra-files/* orchestra/

# Step 2: Clone unify as sibling
- name: 'gcr.io/cloud-builders/git'
  id: Clone unify
  secretEnv: ['GITHUB_TOKEN']
  entrypoint: 'bash'
  args:
  - '-c'
  - |
    git clone --depth 1 -b staging https://x-access-token:$$GITHUB_TOKEN@github.com/unifyai/unify.git unify
  waitFor: ['Reorganize workspace']

# Step 3: Clone unillm as sibling
- name: 'gcr.io/cloud-builders/git'
  id: Clone unillm
  secretEnv: ['GITHUB_TOKEN']
  entrypoint: 'bash'
  args:
  - '-c'
  - |
    git clone --depth 1 -b staging https://x-access-token:$$GITHUB_TOKEN@github.com/unifyai/unillm.git unillm
  waitFor: ['Clone unify']

# Step 4: Pull Docker cache
- name: gcr.io/cloud-builders/docker
  entrypoint: 'bash'
  args: ['-c', 'docker pull $_AR_HOSTNAME/$PROJECT_ID/cloud-run-source-deploy/$REPO_NAME/$_SERVICE_NAME:$_FIXED_COMMIT_HASH || exit 0']
  id: Pull Docker Cache
  waitFor: ['Clone unillm']

# Step 5: Build Docker (context is workspace root with orchestra/, unify/, unillm/)
- name: gcr.io/cloud-builders/docker
  args:
  - 'build'
  - '-t'
  - '$_AR_HOSTNAME/$PROJECT_ID/cloud-run-source-deploy/$REPO_NAME/$_SERVICE_NAME:$COMMIT_SHA'
  - '--cache-from'
  - '$_AR_HOSTNAME/$PROJECT_ID/cloud-run-source-deploy/$REPO_NAME/$_SERVICE_NAME:$_FIXED_COMMIT_HASH'
  - '-f'
  - 'orchestra/deploy/Dockerfile'
  - '--target'
  - 'prod'
  - '.'
  id: Build Orchestra
  waitFor: ['Pull Docker Cache']

- name: gcr.io/cloud-builders/docker
  args:
  - push
  - >-
    $_AR_HOSTNAME/$PROJECT_ID/cloud-run-source-deploy/$REPO_NAME/$_SERVICE_NAME:$COMMIT_SHA
  id: Push Orchestra
  waitFor:
  - 'Build Orchestra'

- name: gcr.io/cloud-builders/docker
  args: ['tag', '$_AR_HOSTNAME/$PROJECT_ID/cloud-run-source-deploy/$REPO_NAME/$_SERVICE_NAME:$COMMIT_SHA', '$_AR_HOSTNAME/$PROJECT_ID/cloud-run-source-deploy/$REPO_NAME/$_SERVICE_NAME:latest']
  id: Build Orchestra Latest
  waitFor:
  - 'Push Orchestra'

- name: gcr.io/cloud-builders/docker
  args:
  - push
  - >-
    $_AR_HOSTNAME/$PROJECT_ID/cloud-run-source-deploy/$REPO_NAME/$_SERVICE_NAME:latest
  id: Push Orchestra Latest
  waitFor:
  - 'Build Orchestra Latest'

- name: 'gcr.io/google.com/cloudsdktool/cloud-sdk:slim'
  args:
  - run
  - jobs
  - update
  - $_JOB_NAME
  - >-
    --image=$_AR_HOSTNAME/$PROJECT_ID/cloud-run-source-deploy/$REPO_NAME/$_SERVICE_NAME:$COMMIT_SHA
  - >-
    --labels=managed-by=gcp-cloud-build-deploy-cloud-run,commit-sha=$COMMIT_SHA,gcb-build-id=$BUILD_ID,gcb-trigger-id=$_TRIGGER_ID
  - '--region=$_JOB_REGION'
  - '--quiet'
  id: Update migration image
  entrypoint: gcloud
  waitFor:
  - 'Push Orchestra'

- name: 'gcr.io/google.com/cloudsdktool/cloud-sdk:slim'
  args:
  - run
  - jobs
  - execute
  - $_JOB_NAME
  - '--region=$_JOB_REGION'
  - '--wait'
  id: Migrate
  entrypoint: gcloud
  waitFor:
  - 'Update migration image'

- name: 'gcr.io/google.com/cloudsdktool/cloud-sdk:slim'
  args:
  - run
  - services
  - update
  - $_SERVICE_NAME
  - '--platform=managed'
  - >-
    --image=$_AR_HOSTNAME/$PROJECT_ID/cloud-run-source-deploy/$REPO_NAME/$_SERVICE_NAME:$COMMIT_SHA
  - >-
    --labels=managed-by=gcp-cloud-build-deploy-cloud-run,commit-sha=$COMMIT_SHA,gcb-build-id=$BUILD_ID,gcb-trigger-id=$_TRIGGER_ID
  - '--region=$_DEPLOY_REGION'
  - '--quiet'
  - '--vpc-connector=orchestra-connector-v2'
  - '--vpc-egress=all-traffic'
  - '--no-cpu-throttling'
  - '--cpu-boost'
  id: Deploy Orchestra
  entrypoint: gcloud
  waitFor:
  - 'Migrate'

images:
- $_AR_HOSTNAME/$PROJECT_ID/cloud-run-source-deploy/$REPO_NAME/$_SERVICE_NAME:$COMMIT_SHA
- $_AR_HOSTNAME/$PROJECT_ID/cloud-run-source-deploy/$REPO_NAME/$_SERVICE_NAME:latest

options:
  substitutionOption: ALLOW_LOOSE
  defaultLogsBucketBehavior: REGIONAL_USER_OWNED_BUCKET

substitutions:
  _JOB_REGION: europe-west3
  _SERVICE_NAME: orchestra-staging
  _TRIGGER_ID: 0bfee4b7-25c8-453a-8484-fca72480864c
  REPO_NAME: orchestra
  _DEPLOY_REGION: europe-west1
  _AR_HOSTNAME: europe-west3-docker.pkg.dev
  _PLATFORM: managed
  _JOB_NAME: orchestra-staging-migrator
  _FIXED_COMMIT_HASH: 8f98f587e9081412d4570356c3e43441d0ff1705

availableSecrets:
  secretManager:
  - versionName: projects/$PROJECT_ID/secrets/DEVBOT_GITHUB_TOKEN/versions/latest
    env: 'GITHUB_TOKEN'

tags:
- gcp-cloud-build-deploy-cloud-run
- gcp-cloud-build-deploy-cloud-run-managed
- orchestra
