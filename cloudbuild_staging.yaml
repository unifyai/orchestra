steps:
- name: gcr.io/cloud-builders/docker
  entrypoint: 'bash'
  args: ['-c', 'docker pull $_AR_HOSTNAME/$PROJECT_ID/cloud-run-source-deploy/$REPO_NAME/$_SERVICE_NAME:$_FIXED_COMMIT_HASH || exit 0']
  id: Pull Docker Cache
- name: gcr.io/cloud-builders/docker
  args: ['build', '-t',
   '$_AR_HOSTNAME/$PROJECT_ID/cloud-run-source-deploy/$REPO_NAME/$_SERVICE_NAME:$COMMIT_SHA',
   '--cache-from',
   '$_AR_HOSTNAME/$PROJECT_ID/cloud-run-source-deploy/$REPO_NAME/$_SERVICE_NAME:$_FIXED_COMMIT_HASH',
   '.', '-f', 'deploy/Dockerfile', '--target', 'prod'
  ]
  id: Build Orchestra
- name: gcr.io/cloud-builders/docker
  args:
    - push
    - >-
      $_AR_HOSTNAME/$PROJECT_ID/cloud-run-source-deploy/$REPO_NAME/$_SERVICE_NAME:$COMMIT_SHA
  id: Push Orchestra
  waitFor:
  - 'Build Orchestra'
- name: 'gcr.io/google.com/cloudsdktool/cloud-sdk:slim'
  args:
  - run
  - jobs
  - update
  - $_JOB_NAME
  - >-
    --image=$_AR_HOSTNAME/$PROJECT_ID/cloud-run-source-deploy/$REPO_NAME/$_SERVICE_NAME:$COMMIT_SHA
  - >-
    --labels=managed-by=gcp-cloud-build-deploy-cloud-run,commit-sha=$COMMIT_SHA,gcb-build-id=$BUILD_ID,gcb-trigger-id=$_TRIGGER_ID
  - '--region=$_JOB_REGION'
  - '--quiet'
  id: Update migration image
  entrypoint: gcloud
  waitFor:
  - 'Push Orchestra'
- name: 'gcr.io/google.com/cloudsdktool/cloud-sdk:slim'
  args:
  - run
  - jobs
  - execute
  - $_JOB_NAME
  - '--region=$_JOB_REGION'
  - '--wait'
  id: Migrate
  entrypoint: gcloud
  waitFor:
  - 'Update migration image'
- name: 'gcr.io/google.com/cloudsdktool/cloud-sdk:slim'
  args:
  - run
  - services
  - update
  - $_SERVICE_NAME
  - '--platform=managed'
  - >-
    --image=$_AR_HOSTNAME/$PROJECT_ID/cloud-run-source-deploy/$REPO_NAME/$_SERVICE_NAME:$COMMIT_SHA
  - >-
    --labels=managed-by=gcp-cloud-build-deploy-cloud-run,commit-sha=$COMMIT_SHA,gcb-build-id=$BUILD_ID,gcb-trigger-id=$_TRIGGER_ID
  - '--region=$_DEPLOY_REGION'
  - '--quiet'
  id: Deploy Orchestra
  entrypoint: gcloud
  waitFor:
  - 'Migrate'
images:
  - >-
    $_AR_HOSTNAME/$PROJECT_ID/cloud-run-source-deploy/$REPO_NAME/$_SERVICE_NAME:$COMMIT_SHA
options:
  substitutionOption: ALLOW_LOOSE
  defaultLogsBucketBehavior: REGIONAL_USER_OWNED_BUCKET
substitutions:
  _JOB_REGION: europe-west3
  _SERVICE_NAME: orchestra
  _TRIGGER_ID: 0bfee4b7-25c8-453a-8484-fca72480864c
  REPO_NAME: orchestra
  _DEPLOY_REGION: europe-west1
  _AR_HOSTNAME: europe-west3-docker.pkg.dev
  _PLATFORM: managed
  _JOB_NAME: orchestra-migrator
  _FIXED_COMMIT_HASH: 99d98a85b721c5e197a8ae537554be82424a6c1b
tags:
- gcp-cloud-build-deploy-cloud-run
- gcp-cloud-build-deploy-cloud-run-managed
- orchestra
