# Receives all info with OpenTelemetry protocol.
receivers:
  otlp:
    protocols:
      grpc:
      http:

# Batch all spans.
processors:
  batch:

exporters:
  # Exports spans to log.
  logging:
    verbosity: normal

  # Exports spans to jaeger.
  otlp/jaeger:
    endpoint: ${env:JAEGER_ENDPOINT}
    tls:
      insecure: ${env:JAEGER_INSECURE}

extensions:
  health_check:
  pprof:

service:
  extensions: [health_check, pprof]
  pipelines:
    traces:
      receivers: [otlp]
      processors: [batch]
      exporters: [logging, otlp/jaeger]
