steps:
- name: 'gcr.io/google.com/cloudsdktool/cloud-sdk:slim'
  args:
  - run
  - jobs
  - update
  - $_JOB_NAME
  - >-
    --image=$_AR_HOSTNAME/$PROJECT_ID/cloud-run-source-deploy/$REPO_NAME/$_SERVICE_NAME:$latest
  - >-
    --labels=managed-by=gcp-cloud-build-deploy-cloud-run,gcb-build-id=$BUILD_ID,gcb-trigger-id=$_TRIGGER_ID
  - '--region=$_JOB_REGION'
  - '--quiet'
  id: Update cloud run image
  entrypoint: gcloud
- name: 'gcr.io/google.com/cloudsdktool/cloud-sdk:slim'
  args:
  - run
  - jobs
  - execute
  - $_JOB_NAME
  - '--region=$_JOB_REGION'
  - '--wait'
  id: Migrate
  entrypoint: gcloud
  waitFor:
  - 'Update cloud run image'
options:
  substitutionOption: ALLOW_LOOSE
  defaultLogsBucketBehavior: REGIONAL_USER_OWNED_BUCKET
substitutions:
  _JOB_REGION: europe-west3
  _SERVICE_NAME: orchestra
  _TRIGGER_ID: 0bfee4b7-25c8-453a-8484-fca72480864c
  REPO_NAME: orchestra
  _AR_HOSTNAME: europe-west3-docker.pkg.dev
  _PLATFORM: managed
  _JOB_NAME: orchestra-benchmarking
tags:
- gcp-cloud-build-deploy-cloud-run
- gcp-cloud-build-deploy-cloud-run-managed
- orchestra
